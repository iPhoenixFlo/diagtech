<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiagTech Admin — iPhoenix</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a1628;
  --bg2:     #071020;
  --surface: #0f1e30;
  --surface2:#152438;
  --surface3:#1a2d44;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --orange:  #f4702a;
  --orange2: #ff8844;
  --orange-dim: rgba(244,112,42,0.1);
  --green:   #22c55e;
  --green-dim: rgba(34,197,94,0.1);
  --red:     #ef4444;
  --red-dim: rgba(239,68,68,0.1);
  --yellow:  #f59e0b;
  --yellow-dim: rgba(245,158,11,0.1);
  --blue:    #3b82f6;
  --blue-dim: rgba(59,130,246,0.1);
  --text:    #e8f0f8;
  --text-mid:#7a9ab8;
  --text-dim:#3a5a78;
  --cond:    'Barlow Condensed', sans-serif;
  --body:    'Barlow', sans-serif;
  --mono:    'JetBrains Mono', monospace;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(244,112,42,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(244,112,42,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  background: var(--bg);
}

.login-card {
  width: 100%; max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 36px;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--orange), var(--orange2));
}

.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
}

.login-logo-icon {
  width: 40px; height: 40px;
  background: var(--orange);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.login-logo-text {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.login-logo-text span { color: var(--orange); }

.login-title {
  font-family: var(--cond);
  font-weight: 900;
  font-size: 28px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}

.login-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-mid);
  letter-spacing: 0.06em;
  margin-bottom: 28px;
}

.login-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 20px;
  letter-spacing: 0.3em;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}

.login-input:focus { border-color: rgba(244,112,42,0.5); }

.login-error {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--red);
  text-align: center;
  min-height: 16px;
  margin-bottom: 12px;
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--orange);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: var(--cond);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.login-btn:hover { background: var(--orange2); transform: translateY(-1px); }

/* ── APP LAYOUT ── */
#app {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

#app.visible { display: flex; }

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-logo {
  display: flex; align-items: center; gap: 10px;
}

.topbar-logo-icon {
  width: 30px; height: 30px;
  background: var(--orange);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}

.topbar-logo-text {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.topbar-logo-text span { color: var(--orange); }

.topbar-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.06em;
}

.topbar-right {
  display: flex; align-items: center; gap: 12px;
}

.topbar-logout {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  transition: all 0.2s;
}

.topbar-logout:hover { color: var(--red); border-color: rgba(239,68,68,0.3); }

/* ── DASHBOARD STATS ── */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 24px 28px 0;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--border2); }

.stat-card-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.stat-card-value {
  font-family: var(--cond);
  font-weight: 900;
  font-size: 36px;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-card-sub {
  font-size: 12px;
  color: var(--text-mid);
}

.stat-card-icon {
  position: absolute;
  right: 16px; top: 16px;
  font-size: 24px;
  opacity: 0.3;
}

.stat-card.orange .stat-card-value { color: var(--orange); }
.stat-card.green  .stat-card-value { color: var(--green); }
.stat-card.yellow .stat-card-value { color: var(--yellow); }
.stat-card.blue   .stat-card-value { color: var(--blue); }

/* ── TABS ── */
.tabs-wrap {
  padding: 20px 28px 0;
}

.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}

.tab {
  padding: 10px 20px 12px;
  font-family: var(--cond);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.tab:hover { color: var(--text-mid); }
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }

.tab-badge {
  background: var(--orange);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  font-family: var(--mono);
}

.tab-badge.green { background: var(--green); }
.tab-badge.gray  { background: var(--surface3); color: var(--text-mid); }

/* ── CONTENT ── */
.content {
  padding: 24px 28px;
  flex: 1;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── FILTERS & ACTIONS ── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
  flex-wrap: wrap;
}

.toolbar-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.toolbar-right { display: flex; gap: 10px; }

.filter-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text-mid);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}

.filter-select:focus { border-color: rgba(244,112,42,0.4); }

.search-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
  outline: none;
  width: 240px;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: rgba(244,112,42,0.4); }
.search-input::placeholder { color: var(--text-dim); }

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-family: var(--cond);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover { background: var(--orange2); transform: translateY(-1px); }
.btn-green  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.btn-green:hover  { background: rgba(34,197,94,0.25); }
.btn-red    { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
.btn-red:hover    { background: rgba(239,68,68,0.2); }
.btn-ghost  { background: transparent; color: var(--text-dim); border: 1px solid var(--border2); }
.btn-ghost:hover  { color: var(--text); border-color: var(--border2); background: var(--surface2); }

/* ── ENTRY CARD ── */
.entry-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
  position: relative;
}

.entry-card:hover { border-color: var(--border2); }

.entry-card.pending { border-left: 3px solid var(--yellow); }
.entry-card.alert   { border-left: 3px solid var(--red); }

.entry-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.entry-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}

.entry-cat {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--orange);
  background: var(--orange-dim);
  border: 1px solid rgba(244,112,42,0.2);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.entry-source {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

.entry-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.entry-symptom {
  font-family: var(--cond);
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
  letter-spacing: 0.01em;
  margin-bottom: 10px;
}

.entry-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.entry-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.entry-section-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.entry-question {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  font-size: 13px;
  color: var(--text-mid);
  margin-bottom: 4px;
  line-height: 1.4;
}

.entry-question::before { content: '?'; color: var(--orange); font-family: var(--mono); font-size: 11px; flex-shrink: 0; margin-top: 1px; }

.cause-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 6px;
}

.cause-rank {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--orange);
  background: var(--orange-dim);
  width: 20px; height: 20px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-weight: 500;
}

.cause-text { flex: 1; }
.cause-name { font-size: 13px; color: var(--text); font-weight: 500; }
.cause-solution { font-size: 11px; color: var(--text-mid); margin-top: 2px; }

/* ── FEEDBACK STATS ── */
.feedback-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 20px;
  transition: border-color 0.2s;
}

.feedback-row:hover { border-color: var(--border2); }
.feedback-row.alert { border-left: 3px solid var(--red); }

.feedback-title {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.feedback-cat {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.feedback-bars {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 200px;
}

.bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--surface3);
  border-radius: 6px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s ease;
}

.bar-fill.green  { background: var(--green); }
.bar-fill.red    { background: var(--red); }

.feedback-pct {
  font-family: var(--mono);
  font-size: 12px;
  min-width: 36px;
  text-align: right;
}

.feedback-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  min-width: 60px;
  text-align: right;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,22,40,0.9);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px;
  width: 100%; max-width: 540px;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
}

.modal-title {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  margin-bottom: 20px;
  padding-right: 32px;
}

.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: none; border: none;
  color: var(--text-dim); cursor: pointer;
  font-size: 18px; line-height: 1;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--text); }

.field { margin-bottom: 16px; }

.field-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  display: block;
}

.field-input, .field-textarea, .field-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.field-input:focus, .field-textarea:focus, .field-select:focus { border-color: rgba(244,112,42,0.4); }
.field-textarea { resize: vertical; min-height: 80px; }

.dynamic-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

.dynamic-item {
  display: flex; gap: 8px; align-items: flex-start;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}

.dynamic-item input {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-family: var(--body); font-size: 13px; outline: none;
}

.dynamic-item-remove {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px; padding: 2px 4px;
  transition: color 0.15s; flex-shrink: 0;
}

.dynamic-item-remove:hover { color: var(--red); }

.add-item-btn {
  background: none; border: 1px dashed var(--border2);
  border-radius: 8px; padding: 8px 14px; color: var(--text-dim);
  font-family: var(--mono); font-size: 11px;
  cursor: pointer; width: 100%; transition: all 0.15s; margin-bottom: 16px;
}

.add-item-btn:hover { border-color: var(--orange); color: var(--orange); }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-family: var(--cond); font-weight: 700; font-size: 18px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 8px; }
.empty-sub { font-size: 13px; line-height: 1.6; }

/* ── LOADING ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; gap: 8px;
  font-family: var(--mono); font-size: 12px; color: var(--text-dim);
}

.loading-dots span {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--orange);
  animation: ldot 1.2s infinite; margin: 0 3px;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes ldot { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 24px;
  font-family: var(--mono);
  font-size: 12px;
  z-index: 300;
  white-space: nowrap;
  animation: toastIn 0.3s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.toast.success { color: var(--green); border-color: rgba(34,197,94,0.3); }
.toast.error   { color: var(--red);   border-color: rgba(239,68,68,0.3); }

@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr 1fr; }
  .entry-body { grid-template-columns: 1fr; }
  .feedback-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🔬</div>
      <div class="login-logo-text">i<span>Phoenix</span></div>
    </div>
    <div class="login-title">Admin DiagTech</div>
    <div class="login-sub">// ACCÈS RESTREINT · CODE PIN REQUIS</div>
    <input
      class="login-input"
      id="pin-input"
      type="password"
      placeholder="• • • •"
      maxlength="8"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') checkPin()"
    />
    <div class="login-error" id="pin-error"></div>
    <button class="login-btn" onclick="checkPin()">Accéder →</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">🔬</div>
      <div class="topbar-logo-text">i<span>Phoenix</span> · DiagTech Admin</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="topbar-env">Chargement...</span>
      <button class="topbar-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- Dashboard stats -->
  <div class="dashboard" id="dashboard">
    <div class="stat-card orange">
      <div class="stat-card-icon">📋</div>
      <div class="stat-card-label">Entrées validées</div>
      <div class="stat-card-value" id="stat-validated">—</div>
      <div class="stat-card-sub">dans la base</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-card-icon">⏳</div>
      <div class="stat-card-label">En attente</div>
      <div class="stat-card-value" id="stat-pending">—</div>
      <div class="stat-card-sub">à valider</div>
    </div>
    <div class="stat-card green">
      <div class="stat-card-icon">✅</div>
      <div class="stat-card-label">Feedbacks positifs</div>
      <div class="stat-card-value" id="stat-positive">—</div>
      <div class="stat-card-sub">confirmations terrain</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-card-icon">🎯</div>
      <div class="stat-card-label">Taux de confirmation</div>
      <div class="stat-card-value" id="stat-rate">—</div>
      <div class="stat-card-sub">précision globale</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending')" id="tab-pending">
        ⏳ En attente
        <span class="tab-badge" id="badge-pending">0</span>
      </button>
      <button class="tab" onclick="switchTab('base')" id="tab-base">
        📋 Base de connaissance
        <span class="tab-badge gray" id="badge-base">0</span>
      </button>
      <button class="tab" onclick="switchTab('feedback')" id="tab-feedback">
        🎯 Feedback terrain
        <span class="tab-badge green" id="badge-feedback">0</span>
      </button>
      <button class="tab" onclick="switchTab('cases')" id="tab-cases">
        🔬 Cas cliniques
        <span class="tab-badge gray" id="badge-cases">0</span>
      </button>
    </div>
  </div>

  <div class="content">

    <!-- ── TAB PENDING ── -->
    <div class="tab-panel active" id="panel-pending">
      <div id="pending-content">
        <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>

    <!-- ── TAB BASE ── -->
    <div class="tab-panel" id="panel-base">
      <div class="toolbar">
        <div class="toolbar-left">
          <select class="filter-select" id="base-cat-filter" onchange="renderBase()">
            <option value="">Toutes les catégories</option>
          </select>
          <input class="search-input" id="base-search" placeholder="Rechercher un symptôme..." oninput="renderBase()" />
        </div>
        <div class="toolbar-right">
          <button class="btn btn-orange" onclick="openAddModal()">+ Ajouter une entrée</button>
        </div>
      </div>
      <div id="base-content">
        <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>

    <!-- ── TAB FEEDBACK ── -->
    <div class="tab-panel" id="panel-feedback">
      <div class="toolbar">
        <div class="toolbar-left">
          <select class="filter-select" id="fb-filter" onchange="renderFeedback()">
            <option value="">Tous les diagnostics</option>
            <option value="alert">⚠️ À réviser (&lt;50%)</option>
            <option value="good">✅ Fiables (&gt;80%)</option>
          </select>
        </div>
      </div>
      <div id="feedback-content">
        <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>

    <!-- ── TAB CASES ── -->
    <div class="tab-panel" id="panel-cases">
      <div id="cases-content">
        <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>
      </div>
    </div>

  </div>
</div>

<!-- ── MODAL EDIT/ADD ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Modifier l'entrée</div>
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="field">
      <label class="field-label">Catégorie</label>
      <select class="field-select" id="modal-cat"></select>
    </div>

    <div class="field">
      <label class="field-label">Symptôme</label>
      <input class="field-input" id="modal-symptom" placeholder="Ex: Ne charge plus du tout" />
    </div>

    <div class="field">
      <label class="field-label">Questions à poser au client</label>
      <div class="dynamic-list" id="modal-questions"></div>
      <button class="add-item-btn" onclick="addQuestion()">+ Ajouter une question</button>
    </div>

    <div class="field">
      <label class="field-label">Causes probables</label>
      <div class="dynamic-list" id="modal-causes"></div>
      <button class="add-item-btn" onclick="addCause()">+ Ajouter une cause</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-orange" onclick="saveEntry()" id="modal-save-btn">Enregistrer →</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
let SB_URL = '', SB_ANON = '', PIN = '';
let categories = [], entries = [], feedbacks = [], cases = [];
let currentEditId = null;
let currentTab = 'pending';

// ─── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    SB_URL  = cfg.supabaseUrl;
    SB_ANON = cfg.supabaseAnon;
    PIN     = cfg.contribPin;
  } catch(e) {
    showToast('Erreur chargement config', 'error');
  }
}

init();

// ─── AUTH ────────────────────────────────────────────────────────────────────
async function checkPin() {
  const input = document.getElementById('pin-input').value.trim();
  const err   = document.getElementById('pin-error');

  if (!PIN) {
    await init();
    if (!PIN) { err.textContent = '→ Impossible de charger la configuration.'; return; }
  }

  if (input !== PIN) {
    err.textContent = '→ Code PIN incorrect.';
    document.getElementById('pin-input').value = '';
    return;
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  loadAll();
}

function logout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pin-input').value = '';
}

// ─── SUPABASE ────────────────────────────────────────────────────────────────
async function sbFetch(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SB_ANON, 'Authorization': `Bearer ${SB_ANON}` }
  });
  if (!r.ok) throw new Error(`Supabase ${r.status}`);
  return r.json();
}

async function sbPatch(table, id, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey': SB_ANON, 'Authorization': `Bearer ${SB_ANON}`,
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`Patch error ${r.status}`);
}

async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE',
    headers: { 'apikey': SB_ANON, 'Authorization': `Bearer ${SB_ANON}` }
  });
  if (!r.ok) throw new Error(`Delete error ${r.status}`);
}

async function sbInsert(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SB_ANON, 'Authorization': `Bearer ${SB_ANON}`,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`Insert error ${r.status}`);
  return r.json();
}

// ─── LOAD ALL ────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    [categories, entries, feedbacks, cases] = await Promise.all([
      sbFetch('diagnostic_categories?select=*&order=display_order'),
      sbFetch('diagnostic_entries?select=*&order=created_at.desc'),
      sbFetch('diagnostic_feedback?select=*&order=created_at.desc'),
      sbFetch('clinical_cases?select=*&order=created_at.desc')
    ]);

    updateDashboard();
    populateCatFilters();
    renderPending();
    renderBase();
    renderFeedback();
    renderCases();

    document.getElementById('topbar-env').textContent =
      `${entries.filter(e=>e.validated).length} entrées · ${categories.length} catégories`;

  } catch(e) {
    showToast('Erreur chargement données', 'error');
  }
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function updateDashboard() {
  const validated = entries.filter(e => e.validated).length;
  const pending   = entries.filter(e => !e.validated).length;
  const positive  = feedbacks.filter(f => f.confirmed).length;
  const total     = feedbacks.length;
  const rate      = total > 0 ? Math.round(positive / total * 100) : 0;

  document.getElementById('stat-validated').textContent = validated;
  document.getElementById('stat-pending').textContent   = pending;
  document.getElementById('stat-positive').textContent  = positive;
  document.getElementById('stat-rate').textContent      = total > 0 ? rate + '%' : '—';

  document.getElementById('badge-pending').textContent  = pending;
  document.getElementById('badge-base').textContent     = validated;
  document.getElementById('badge-feedback').textContent = total;
  document.getElementById('badge-cases').textContent    = cases.length;
}

function populateCatFilters() {
  ['base-cat-filter'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="">Toutes les catégories</option>';
    categories.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      if (c.id === cur) o.selected = true;
      sel.appendChild(o);
    });
  });

  // Modal cat select
  const mcat = document.getElementById('modal-cat');
  mcat.innerHTML = '';
  categories.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.name;
    mcat.appendChild(o);
  });
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ─── RENDER PENDING ──────────────────────────────────────────────────────────
function renderPending() {
  const pending = entries.filter(e => !e.validated);
  const el = document.getElementById('pending-content');

  if (pending.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">Aucune contribution en attente</div><div class="empty-sub">Toutes les entrées ont été traitées.</div></div>`;
    return;
  }

  el.innerHTML = pending.map(e => renderEntryCard(e, true)).join('');
}

// ─── RENDER BASE ─────────────────────────────────────────────────────────────
function renderBase() {
  const catFilter = document.getElementById('base-cat-filter')?.value || '';
  const search    = document.getElementById('base-search')?.value.toLowerCase() || '';

  let filtered = entries.filter(e => e.validated);
  if (catFilter) filtered = filtered.filter(e => e.category_id === catFilter);
  if (search)    filtered = filtered.filter(e => e.symptom.toLowerCase().includes(search));

  const el = document.getElementById('base-content');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucune entrée</div><div class="empty-sub">Modifiez les filtres ou ajoutez une entrée.</div></div>`;
    return;
  }
  el.innerHTML = filtered.map(e => renderEntryCard(e, false)).join('');
}

// ─── RENDER ENTRY CARD ───────────────────────────────────────────────────────
function renderEntryCard(e, isPending) {
  const cat      = categories.find(c => c.id === e.category_id);
  const catName  = cat?.name || '?';
  const causes   = e.causes || [];
  const questions = e.questions_to_ask || [];
  const date     = new Date(e.created_at).toLocaleDateString('fr-FR');

  // Feedback stats pour cette entrée
  const fb = feedbacks.filter(f => f.diagnosis_title === e.symptom);
  const fbOk = fb.filter(f => f.confirmed).length;
  const fbRate = fb.length > 0 ? Math.round(fbOk / fb.length * 100) : null;
  const hasAlert = fbRate !== null && fbRate < 50 && fb.length >= 3;

  const causesHtml = causes.slice(0,3).map(c => `
    <div class="cause-row">
      <div class="cause-rank">${c.rank}</div>
      <div class="cause-text">
        <div class="cause-name">${c.cause}</div>
        <div class="cause-solution">→ ${c.solution}</div>
      </div>
    </div>`).join('');

  const questionsHtml = questions.slice(0,4).map(q => `
    <div class="entry-question">${q}</div>`).join('');

  const fbBadge = fbRate !== null
    ? `<span style="font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;background:${fbRate>=70?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)'};color:${fbRate>=70?'var(--green)':'var(--red)'};">${fbRate}% ✓ (${fb.length})</span>`
    : '';

  const pendingActions = isPending ? `
    <button class="btn btn-green" onclick="validateEntry('${e.id}')">✅ Valider</button>
    <button class="btn btn-red"   onclick="rejectEntry('${e.id}')">✕ Rejeter</button>` : `
    <button class="btn btn-ghost" onclick="openEditModal('${e.id}')">✏️ Modifier</button>
    <button class="btn btn-red"   onclick="deleteEntry('${e.id}')">🗑️</button>`;

  return `
    <div class="entry-card ${isPending?'pending':''} ${hasAlert?'alert':''}" id="entry-${e.id}">
      <div class="entry-header">
        <div style="flex:1">
          <div class="entry-meta">
            <span class="entry-cat">${catName}</span>
            <span class="entry-source">${e.source || 'flo'}</span>
            <span class="entry-date">${date}</span>
            ${fbBadge}
            ${hasAlert ? '<span style="font-family:var(--mono);font-size:10px;color:var(--red);">⚠️ À RÉVISER</span>' : ''}
          </div>
          <div class="entry-symptom">${e.symptom}</div>
        </div>
        <div class="entry-actions">${pendingActions}</div>
      </div>
      <div class="entry-body">
        <div>
          <div class="entry-section-title">Questions (${questions.length})</div>
          ${questionsHtml || '<div style="font-size:13px;color:var(--text-dim);">Aucune question définie</div>'}
        </div>
        <div>
          <div class="entry-section-title">Causes (${causes.length})</div>
          ${causesHtml || '<div style="font-size:13px;color:var(--text-dim);">Aucune cause définie</div>'}
        </div>
      </div>
    </div>`;
}

// ─── RENDER FEEDBACK ─────────────────────────────────────────────────────────
function renderFeedback() {
  const filter = document.getElementById('fb-filter')?.value || '';

  // Grouper par diagnosis_title
  const groups = {};
  feedbacks.forEach(f => {
    if (!groups[f.diagnosis_title]) groups[f.diagnosis_title] = { ok: 0, ko: 0, cat: f.category_name };
    f.confirmed ? groups[f.diagnosis_title].ok++ : groups[f.diagnosis_title].ko++;
  });

  let rows = Object.entries(groups).map(([title, g]) => ({
    title, cat: g.cat,
    ok: g.ok, ko: g.ko,
    total: g.ok + g.ko,
    rate: Math.round(g.ok / (g.ok + g.ko) * 100)
  })).sort((a,b) => b.total - a.total);

  if (filter === 'alert') rows = rows.filter(r => r.rate < 50 && r.total >= 3);
  if (filter === 'good')  rows = rows.filter(r => r.rate > 80);

  const el = document.getElementById('feedback-content');

  if (rows.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">Aucun feedback</div><div class="empty-sub">Les retours techniciens apparaîtront ici.</div></div>`;
    return;
  }

  el.innerHTML = rows.map(r => `
    <div class="feedback-row ${r.rate < 50 && r.total >= 3 ? 'alert' : ''}">
      <div style="flex:1">
        <div class="feedback-title">${r.title}</div>
        <div class="feedback-cat">${r.cat || '—'}</div>
      </div>
      <div class="feedback-bars">
        <div class="bar-wrap"><div class="bar-fill green" style="width:${r.rate}%"></div></div>
        <div class="feedback-pct" style="color:${r.rate>=70?'var(--green)':r.rate>=50?'var(--yellow)':'var(--red)'};">${r.rate}%</div>
      </div>
      <div class="feedback-count">${r.ok}✅ ${r.ko}❌</div>
    </div>`).join('');
}

// ─── RENDER CASES ────────────────────────────────────────────────────────────
function renderCases() {
  const el = document.getElementById('cases-content');

  if (cases.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔬</div><div class="empty-title">Aucun cas clinique</div><div class="empty-sub">Les cas terrain enregistrés apparaîtront ici.</div></div>`;
    return;
  }

  el.innerHTML = cases.map(c => {
    const date = new Date(c.created_at).toLocaleDateString('fr-FR');
    const outcomeColor = c.outcome === 'Résolu' ? 'var(--green)' : c.outcome === 'Partiel' ? 'var(--yellow)' : 'var(--red)';
    return `
      <div class="entry-card">
        <div class="entry-header">
          <div style="flex:1">
            <div class="entry-meta">
              <span class="entry-cat">${c.device || '—'}</span>
              <span class="entry-source">${c.contributed_by || 'flo'}</span>
              <span class="entry-date">${date}</span>
              <span style="font-family:var(--mono);font-size:10px;color:${outcomeColor};background:${outcomeColor}22;padding:2px 8px;border-radius:4px;">${c.outcome || '?'}</span>
            </div>
            <div class="entry-symptom">${c.symptom_observed || '—'}</div>
          </div>
        </div>
        <div class="entry-body">
          <div>
            <div class="entry-section-title">Contexte</div>
            <div style="font-size:13px;color:var(--text-mid);line-height:1.5;">${c.context || '—'}</div>
          </div>
          <div>
            <div class="entry-section-title">Solution appliquée</div>
            <div style="font-size:13px;color:var(--text-mid);line-height:1.5;">${c.solution_applied || '—'}</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
async function validateEntry(id) {
  try {
    await sbPatch('diagnostic_entries', id, { validated: true, validated_by: 'flo' });
    const e = entries.find(e => e.id === id);
    if (e) e.validated = true;
    updateDashboard();
    renderPending();
    renderBase();
    showToast('✅ Entrée validée', 'success');
  } catch(e) { showToast('Erreur validation', 'error'); }
}

async function rejectEntry(id) {
  if (!confirm('Supprimer définitivement cette contribution ?')) return;
  try {
    await sbDelete('diagnostic_entries', id);
    entries = entries.filter(e => e.id !== id);
    updateDashboard();
    renderPending();
    showToast('✕ Entrée supprimée', 'success');
  } catch(e) { showToast('Erreur suppression', 'error'); }
}

async function deleteEntry(id) {
  if (!confirm('Supprimer définitivement cette entrée ?')) return;
  try {
    await sbDelete('diagnostic_entries', id);
    entries = entries.filter(e => e.id !== id);
    updateDashboard();
    renderBase();
    showToast('🗑️ Entrée supprimée', 'success');
  } catch(e) { showToast('Erreur suppression', 'error'); }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openAddModal() {
  currentEditId = null;
  document.getElementById('modal-title').textContent = 'Ajouter une entrée';
  document.getElementById('modal-symptom').value = '';
  document.getElementById('modal-questions').innerHTML = '';
  document.getElementById('modal-causes').innerHTML = '';
  addQuestion(); addCause();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  const e = entries.find(e => e.id === id);
  if (!e) return;
  currentEditId = id;

  document.getElementById('modal-title').textContent = 'Modifier l\'entrée';
  document.getElementById('modal-cat').value   = e.category_id || '';
  document.getElementById('modal-symptom').value = e.symptom || '';

  // Questions
  const qList = document.getElementById('modal-questions');
  qList.innerHTML = '';
  (e.questions_to_ask || []).forEach(q => addQuestion(q));
  if (!e.questions_to_ask?.length) addQuestion();

  // Causes
  const cList = document.getElementById('modal-causes');
  cList.innerHTML = '';
  (e.causes || []).forEach(c => addCause(c.cause, c.solution));
  if (!e.causes?.length) addCause();

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentEditId = null;
}

function addQuestion(val = '') {
  const list = document.getElementById('modal-questions');
  const div  = document.createElement('div');
  div.className = 'dynamic-item';
  div.innerHTML = `<input placeholder="Ex: Chute récente ?" value="${val}" /><button class="dynamic-item-remove" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(div);
}

function addCause(cause = '', solution = '') {
  const list = document.getElementById('modal-causes');
  const div  = document.createElement('div');
  div.className = 'dynamic-item';
  div.style.flexDirection = 'column';
  div.style.gap = '6px';
  div.innerHTML = `
    <input placeholder="Cause — Ex: Port encrassé" value="${cause}" style="width:100%" />
    <input placeholder="Solution — Ex: Nettoyage pro" value="${solution}" style="width:100%" />
    <button class="dynamic-item-remove" style="align-self:flex-end" onclick="this.parentElement.remove()">✕ Supprimer</button>`;
  list.appendChild(div);
}

async function saveEntry() {
  const categoryId = document.getElementById('modal-cat').value;
  const symptom    = document.getElementById('modal-symptom').value.trim();
  if (!symptom) { showToast('Symptôme obligatoire', 'error'); return; }

  const questions = [...document.querySelectorAll('#modal-questions .dynamic-item input')]
    .map(i => i.value.trim()).filter(Boolean);

  const causeItems = document.querySelectorAll('#modal-causes .dynamic-item');
  const causes = [...causeItems].map((item, idx) => {
    const inputs = item.querySelectorAll('input');
    return { rank: idx + 1, cause: inputs[0]?.value.trim() || '', solution: inputs[1]?.value.trim() || '' };
  }).filter(c => c.cause);

  const keywords = symptom.toLowerCase().split(/\s+/).filter(w => w.length > 3);

  const data = { category_id: categoryId, symptom, questions_to_ask: questions, causes, keywords, validated: true, validated_by: 'flo', source: 'flo' };

  try {
    if (currentEditId) {
      await sbPatch('diagnostic_entries', currentEditId, data);
      const idx = entries.findIndex(e => e.id === currentEditId);
      if (idx >= 0) entries[idx] = { ...entries[idx], ...data };
      showToast('✅ Entrée modifiée', 'success');
    } else {
      const res = await sbInsert('diagnostic_entries', data);
      entries.unshift(res[0]);
      showToast('✅ Entrée ajoutée', 'success');
    }
    updateDashboard();
    renderBase();
    closeModal();
  } catch(e) { showToast('Erreur sauvegarde', 'error'); }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
