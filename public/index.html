<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiagTech — Akinator Réparateur v2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0f;
    --surface: #0f1218;
    --surface2: #161b24;
    --surface3: #1c2330;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --green: #00ff87;
    --red: #ff4757;
    --yellow: #ffd32a;
    --blue: #00b4d8;
    --text: #dde3ee;
    --text-muted: #556070;
    --text-dim: #8896aa;
  }

  body {
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,255,135,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,180,216,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .app { width: 100%; max-width: 600px; position: relative; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); display: block; margin-top: 1px; }
  .reset-btn {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2);
    background: transparent; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--text); background: var(--surface2); }

  /* PROGRESS */
  .progress-bar { height: 2px; background: var(--surface3); border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); border-radius: 2px; transition: width 0.4s ease; }

  /* BREADCRUMB */
  .breadcrumb { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; min-height: 24px; }
  .crumb {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-muted); background: var(--surface2);
    border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .crumb .answer { color: var(--green); }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 20px; padding: 32px; margin-bottom: 20px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .q-number {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .q-number::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .q-text { font-size: 22px; font-weight: 600; line-height: 1.35; letter-spacing: -0.02em; margin-bottom: 28px; }
  .q-hint {
    font-size: 13px; color: var(--text-muted); background: var(--surface2);
    border-left: 2px solid var(--border2); padding: 10px 14px;
    border-radius: 0 8px 8px 0; margin-bottom: 28px; line-height: 1.5;
  }

  /* CATEGORY GRID */
  .categories-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-btn {
    padding: 20px 16px; border-radius: 14px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .cat-btn:hover { transform: translateY(-2px); background: var(--surface3); border-color: rgba(0,255,135,0.3); }
  .cat-icon { font-size: 28px; }
  .cat-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }

  /* ANSWERS */
  .answers { display: grid; gap: 10px; }
  .answers.two-col { grid-template-columns: 1fr 1fr; }
  .ans-btn {
    padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: left;
    display: flex; align-items: center; gap: 12px;
  }
  .ans-btn:hover { transform: translateY(-1px); background: var(--surface3); }
  .ans-btn.yes { border-color: rgba(0,255,135,0.2); }
  .ans-btn.yes:hover { border-color: rgba(0,255,135,0.5); background: rgba(0,255,135,0.06); color: var(--green); }
  .ans-btn.no { border-color: rgba(255,71,87,0.2); }
  .ans-btn.no:hover { border-color: rgba(255,71,87,0.5); background: rgba(255,71,87,0.06); color: var(--red); }
  .ans-btn.maybe { border-color: rgba(255,211,42,0.2); }
  .ans-btn.maybe:hover { border-color: rgba(255,211,42,0.5); background: rgba(255,211,42,0.06); color: var(--yellow); }
  .ans-icon { font-size: 18px; flex-shrink: 0; }

  /* RESULT */
  .result-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
  .result-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .result-icon.urgent { background: rgba(255,71,87,0.12); border: 1px solid rgba(255,71,87,0.3); }
  .result-icon.normal { background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.2); }
  .result-icon.warning { background: rgba(255,211,42,0.08); border: 1px solid rgba(255,211,42,0.2); }
  .result-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .result-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

  .result-piece { background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .result-piece-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .result-piece-value { font-size: 16px; font-weight: 600; color: var(--green); }

  .urgency-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
    margin-bottom: 20px;
  }
  .urgency-tag.urgent { background: rgba(255,71,87,0.12); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
  .urgency-tag.normal { background: rgba(0,255,135,0.08); color: var(--green); border: 1px solid rgba(0,255,135,0.2); }
  .urgency-tag.warning { background: rgba(255,211,42,0.08); color: var(--yellow); border: 1px solid rgba(255,211,42,0.2); }

  .result-notes { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .result-note { display: flex; align-items: flex-start; gap: 10px; font-size: 13.5px; color: var(--text-dim); line-height: 1.5; }
  .note-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); margin-top: 7px; flex-shrink: 0; }

  .confidence { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .confidence-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .confidence-bar { flex: 1; height: 4px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .confidence-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .action-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    margin-bottom: 8px;
  }
  .action-btn:hover { background: var(--surface3); border-color: rgba(255,255,255,0.15); }
  .action-btn.deepen { border-color: rgba(0,180,216,0.3); color: var(--blue); }
  .action-btn.deepen:hover { background: rgba(0,180,216,0.08); border-color: rgba(0,180,216,0.5); }

  /* LOADING */
  .loading-dots { display: flex; gap: 6px; justify-content: center; margin-top: 24px; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue); animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* STATUS BAR */
  .status-bar {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.green { background: var(--green); animation: pulse-dot 2s infinite; }
  .status-dot.yellow { background: var(--yellow); }
  .status-dot.red { background: var(--red); }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* FREE TEXT INPUT */
  .text-input-wrap { display: flex; gap: 10px; margin-top: 8px; }
  .text-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 13px 16px; color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .text-input:focus { border-color: rgba(0,180,216,0.4); }
  .text-input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    border: none; cursor: pointer; font-size: 18px; flex-shrink: 0;
    transition: transform 0.15s;
  }
  .send-btn:hover { transform: scale(1.08); }

  .result-divider { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin: 4px 0 12px; letter-spacing: 0.08em; }

  /* CONTRIBUTION MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(8,10,15,0.92);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 20px; backdrop-filter: blur(6px);
    overflow-y: auto;
  }
  .modal {
    width: 100%; max-width: 560px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 20px;
    padding: 32px; margin: auto; animation: slideIn 0.3s ease;
  }
  .modal h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .modal-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-bottom: 24px; }
  .field-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .field-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s; margin-bottom: 16px;
  }
  .field-input:focus { border-color: rgba(0,180,216,0.4); }
  .field-input::placeholder { color: var(--text-muted); }
  select.field-input { cursor: pointer; }
  .dynamic-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .dynamic-item {
    display: flex; gap: 8px; align-items: flex-start;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
  }
  .dynamic-item input, .dynamic-item textarea {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; outline: none; resize: none;
    min-height: 20px;
  }
  .dynamic-item textarea { min-height: 36px; }
  .remove-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; padding: 2px 4px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .remove-btn:hover { color: var(--red); }
  .add-btn {
    background: none; border: 1px dashed var(--border2);
    border-radius: 8px; padding: 8px 14px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; width: 100%; transition: all 0.15s; margin-bottom: 16px;
  }
  .add-btn:hover { border-color: var(--green); color: var(--green); }
  .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
  .submit-btn {
    padding: 13px; border-radius: 12px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    border: none; color: #080a0f; font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.85; }
  .cancel-btn {
    padding: 13px; border-radius: 12px; background: var(--surface2);
    border: 1px solid var(--border2); color: var(--text-muted);
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.15s;
  }
  .cancel-btn:hover { color: var(--text); background: var(--surface3); }
  .pin-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
  .pin-row .field-input { margin-bottom: 0; width: 140px; letter-spacing: 0.2em; font-family: 'JetBrains Mono', monospace; }
  .contrib-btn {
    display: flex; align-items: center; gap: 8px;
    margin-top: 16px; padding: 11px 16px; border-radius: 10px;
    border: 1px dashed rgba(0,180,216,0.3); background: transparent;
    color: var(--blue); font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; width: 100%;
  }
  .contrib-btn:hover { background: rgba(0,180,216,0.06); border-color: rgba(0,180,216,0.5); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div>
        <h1>DiagTech</h1>
        <span id="status-label">Chargement...</span>
      </div>
    </div>
    <button class="reset-btn" onclick="reset()">↩ Recommencer</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 0%"></div></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="main"></div>

</div>

<script>
// ─── CONFIG (chargée depuis /api/config au démarrage) ─────────────────────────
let SUPABASE_URL  = '';
let SUPABASE_ANON = '';
const MAX_STEPS = 8;

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  screen: 'loading',       // loading | categories | diagnosing | result | error
  categories: [],
  entries: [],
  selectedCategory: null,
  messages: [],            // Claude conversation messages
  questionHistory: [],     // [{q, a}] pour le breadcrumb
  stepCount: 0,
  currentQuestion: null,
  currentResult: null,
};

// ─── SUPABASE REST ────────────────────────────────────────────────────────────
async function sbFetch(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) throw new Error(`Supabase error ${res.status}`);
  return res.json();
}

async function loadCategories() {
  return sbFetch('diagnostic_categories?select=*&order=display_order');
}

async function loadEntries(categoryId) {
  return sbFetch(`diagnostic_entries?select=*&category_id=eq.${categoryId}&validated=eq.true`);
}

async function loadFeedbackStats(diagnosisTitle) {
  try {
    const rows = await sbFetch(`diagnostic_feedback?select=confirmed&diagnosis_title=eq.${encodeURIComponent(diagnosisTitle)}`);
    const confirmed = rows.filter(r => r.confirmed).length;
    const total = rows.length;
    return { confirmed, total };
  } catch { return { confirmed: 0, total: 0 }; }
}

async function saveFeedback(confirmed) {
  const r = state.currentResult;
  if (!r) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/diagnostic_feedback`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        category_name: state.selectedCategory?.name || '',
        symptom_matched: r.symptom_match || '',
        diagnosis_title: r.title,
        question_path: state.questionHistory,
        confirmed: confirmed,
        confidence_at_time: r.confidence || 0
      })
    });
  } catch (e) { console.error('[DiagTech] Feedback error:', e); }
}

// ─── CLAUDE AKINATOR ──────────────────────────────────────────────────────────
function buildSystemPrompt(category, entries, feedbackStats) {
  const entriesText = entries.map(e => {
    const causes = (e.causes || []).map(c => `  - [${c.rank}] ${c.cause} → ${c.solution}`).join('\n');
    const questions = (e.questions_to_ask || []).join(', ');
    const stats = feedbackStats[e.symptom];
    const statsNote = stats && stats.total > 0
      ? `\nSTATS TERRAIN: ${stats.confirmed}/${stats.total} confirmations techniciens`
      : '';
    return `SYMPTÔME: "${e.symptom}"\nQuestions suggérées: ${questions}\nCauses probables:\n${causes}${statsNote}`;
  }).join('\n\n---\n\n');

  return `Tu es un expert en diagnostic de réparation de smartphones. Tu travailles comme Akinator : tu poses des questions très ciblées pour identifier la panne avec précision.

CATÉGORIE : ${category.name}

BASE DE CONNAISSANCE DISPONIBLE (enrichie par les retours terrain) :
${entriesText}

RÈGLES :
1. Pose UNE seule question par tour — la plus discriminante pour éliminer le maximum de causes
2. Questions courtes, pratiques, adaptées à un technicien en atelier
3. Dès que tu as une confiance ≥ 75%, donne le résultat final (max 7 questions)
4. Commence toujours par les questions les plus simples (eau, choc, reconditionné)
5. Adapte tes questions à l'historique — ne répète jamais une question posée
6. Tiens compte des STATS TERRAIN pour ajuster la confiance — plus un diagnostic a de confirmations, plus ta confiance peut être élevée

Réponds UNIQUEMENT en JSON valide, sans texte avant ou après.

FORMAT QUESTION :
{
  "type": "question",
  "text": "La question concise",
  "hint": "Conseil pratique pour le technicien (null si pas utile)",
  "options": [
    {"label": "Texte", "icon": "emoji", "style": "yes|no|maybe"}
  ]
}

FORMAT RÉSULTAT :
{
  "type": "result",
  "title": "Diagnostic court",
  "piece": "Intervention recommandée",
  "urgency": "normal|urgent|warning",
  "icon": "emoji",
  "confidence": 85,
  "notes": ["note tech 1", "note tech 2", "note tech 3"],
  "symptom_match": "symptôme correspondant dans la base"
}`;
}

async function askClaude() {
  renderLoading('Analyse en cours...', 'Recherche de la question la plus pertinente', 'Réduction de l\'entonnoir...');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        system: buildSystemPrompt(state.selectedCategory, state.entries, state.feedbackStats || {}),
        messages: state.messages
      })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();

    const textBlock = data.content?.find(b => b.type === 'text');
    if (!textBlock) throw new Error('No text response');

    const clean = textBlock.text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    state.messages.push({ role: 'assistant', content: textBlock.text });

    if (parsed.type === 'question') {
      state.currentQuestion = parsed;
      state.screen = 'diagnosing';
      render();
    } else if (parsed.type === 'result') {
      state.currentResult = parsed;
      state.screen = 'result';
      render();
    } else {
      throw new Error('Invalid response type');
    }

  } catch (e) {
    console.error('[DiagTech] Claude error:', e);
    renderError('Erreur de connexion', e.message.includes('401') ? 'Vérifiez la clé API Anthropic dans les variables d\'environnement Vercel.' : 'Vérifiez votre connexion et réessayez.');
  }
}

function answerQuestion(idx) {
  const o = window._currentOptions[idx];
  if (!o) return;
  const q = state.currentQuestion;

  state.questionHistory.push({ q: q.text, a: o.label });
  state.stepCount++;

  state.messages.push({
    role: 'user',
    content: `Question posée au technicien : "${q.text}"\nRéponse : "${o.label}"`
  });

  askClaude();
}

async function submitFeedback(confirmed) {
  // Masquer les boutons, afficher le message
  const btns = document.getElementById('feedback-btns');
  const thanks = document.getElementById('feedback-thanks');
  if (btns) btns.style.display = 'none';
  if (thanks) {
    thanks.style.display = 'block';
    thanks.textContent = confirmed
      ? '✅ Merci — ce retour améliore la fiabilité du diagnostic.'
      : '❌ Noté — ce retour aidera à corriger le diagnostic.';
  }
  await saveFeedback(confirmed);
}

async function deepen() {
  state.messages.push({
    role: 'user',
    content: `Le diagnostic proposé "${state.currentResult?.title}" n'a pas résolu le problème ou semble insuffisant. Utilise ta capacité de recherche web pour trouver des pannes similaires documentées sur des forums de réparation, iFixit, ou d'autres sources techniques. Propose une piste alternative approfondie basée sur ta recherche ET sur la base de connaissance disponible. Réponds en JSON avec le format résultat habituel.`
  });
  state.stepCount++;
  state.questionHistory.push({ q: 'Piste insuffisante', a: 'Recherche web' });

  renderLoading('Recherche web en cours...', 'Consultation de sources techniques', 'Analyse des cas similaires...');

  try {
    const res = await fetch('/api/deepen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystemPrompt(state.selectedCategory, state.entries, state.feedbackStats || {}),
        messages: state.messages
      })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();

    const textBlock = data.content?.find(b => b.type === 'text');
    if (!textBlock) throw new Error('Pas de réponse texte');

    const clean = textBlock.text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    state.messages.push({ role: 'assistant', content: textBlock.text });
    state.currentResult = { ...parsed, webSearched: true };
    state.screen = 'result';
    render();

  } catch (e) {
    console.error('[DiagTech] Deepen error:', e);
    renderError('Erreur recherche', 'La recherche web a échoué. Vérifiez votre connexion.');
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateProgress();
  renderBreadcrumb();

  switch (state.screen) {
    case 'loading':    renderLoadingInit(); break;
    case 'categories': renderCategories(); break;
    case 'diagnosing': renderQuestion(); break;
    case 'result':     renderResult(); break;
    case 'error':      break; // renderError appelé directement
  }
}

function renderLoadingInit() {
  document.getElementById('status-label').textContent = 'Connexion base de données...';
  document.getElementById('main').innerHTML = `
    <div class="card" style="text-align:center; padding:48px 32px;">
      <div style="font-size:36px; margin-bottom:20px;">🔬</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--blue); margin-bottom:8px;">Chargement de la base de connaissance...</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;
}

function renderCategories() {
  const label = `v2.0 · ${state.categories.length} catégories · ${state.entries?.length || 0} entrées`;
  document.getElementById('status-label').textContent = label;

  const catIcons = { 'Écran': '📱', 'Batterie': '🔋', 'Charge': '⚡', 'Audio': '🔊', 'Caméra': '📷', 'Réseau': '📶', 'Redémarrages': '🔄' };

  const grid = state.categories.map(c => `
    <button class="cat-btn" onclick="selectCategory('${c.id}')">
      <span class="cat-icon">${catIcons[c.name] || '🔧'}</span>
      <span>${c.name}</span>
    </button>
  `).join('');

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="q-number">Accueil</div>
      <div class="q-text">Quelle catégorie de panne ?</div>
      <div class="q-hint">💡 Sélectionne la catégorie qui correspond au symptôme signalé par le client.</div>
      <div class="categories-grid">${grid}</div>
      <button class="contrib-btn" onclick="openContribModal()">
        ➕ Contribuer — Ajouter une panne connue
      </button>
    </div>`;
}

function renderQuestion() {
  const q = state.currentQuestion;
  if (!q) return;

  const cols = q.options?.length === 2 ? 'two-col' : '';
  const hint = q.hint ? `<div class="q-hint">💡 ${q.hint}</div>` : '';
  // Stocker les options globalement pour éviter les problèmes de guillemets dans onclick
  window._currentOptions = q.options || [];
  const btns = window._currentOptions.map((o, i) => `
    <button class="ans-btn ${o.style || 'maybe'}" onclick="answerQuestion(${i})">
      <span class="ans-icon">${o.icon || '→'}</span>
      <span>${o.label}</span>
    </button>
  `).join('');

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="q-number">Question ${state.stepCount + 1} / ~${MAX_STEPS}</div>
      <div class="q-text">${q.text}</div>
      ${hint}
      <div class="answers ${cols}">${btns}</div>
    </div>`;
}

function renderResult() {
  const r = state.currentResult;
  if (!r) return;

  document.getElementById('status-label').textContent = `v2.0 · Diagnostic en ${state.stepCount} question${state.stepCount > 1 ? 's' : ''}`;

  const urgencyMap = {
    urgent:  { label: '⚡ URGENT — À traiter immédiatement', cls: 'urgent' },
    normal:  { label: '🕐 Peut attendre — Réparation standard', cls: 'normal' },
    warning: { label: '⚠️ À surveiller — Diagnostic approfondi', cls: 'warning' }
  };
  const urg = urgencyMap[r.urgency] || urgencyMap.normal;
  const confColor = r.confidence >= 80 ? '#00ff87' : r.confidence >= 65 ? '#ffd32a' : '#ff4757';

  const notes = (r.notes || []).map(n => `
    <div class="result-note"><div class="note-dot"></div><span>${n}</span></div>
  `).join('');

  const symptomMatch = r.symptom_match ? `
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); margin-bottom:16px;">
      📋 Correspondance base : <span style="color:var(--text-dim);">${r.symptom_match}</span>
    </div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="result-header">
        <div class="result-icon ${urg.cls}">${r.icon || '🔧'}</div>
        <div>
          <div class="result-title">${r.title}</div>
          <div class="result-subtitle">Diagnostic en ${state.stepCount} question${state.stepCount > 1 ? 's' : ''} · ${state.selectedCategory?.name}${r.webSearched ? ' · 🌐 Recherche web' : ''}</div>
        </div>
      </div>

      <div class="confidence">
        <span class="confidence-label">FIABILITÉ</span>
        <div class="confidence-bar">
          <div class="confidence-fill" style="width:${r.confidence}%; background:${confColor};"></div>
        </div>
        <span class="confidence-pct">${r.confidence}%</span>
      </div>

      <div class="result-piece">
        <div class="result-piece-label">Intervention recommandée</div>
        <div class="result-piece-value">→ ${r.piece}</div>
      </div>

      <div class="urgency-tag ${urg.cls}">${urg.label}</div>
      ${symptomMatch}
      <div class="result-notes">${notes}</div>

      <button class="action-btn deepen" onclick="deepen()">🔍 Piste insuffisante — approfondir</button>
      <div class="result-divider">ou</div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;" id="feedback-btns">
        <button class="action-btn" id="btn-correct"
          style="border-color:rgba(0,255,135,0.3); color:var(--green);"
          onclick="submitFeedback(true)">✅ Diagnostic correct</button>
        <button class="action-btn" id="btn-wrong"
          style="border-color:rgba(255,71,87,0.3); color:var(--red);"
          onclick="submitFeedback(false)">❌ Diagnostic incorrect</button>
      </div>
      <div id="feedback-thanks" style="display:none; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); text-align:center; margin-bottom:8px;"></div>

      <button class="action-btn" onclick="backToCategories()">← Changer de catégorie</button>
      <button class="action-btn" onclick="reset()">↩ Nouveau diagnostic</button>
    </div>`;
}

function renderLoading(...lines) {
  document.getElementById('main').innerHTML = `
    <div class="card" style="text-align:center; padding:48px 32px;">
      <div style="font-size:36px; margin-bottom:20px;">🔍</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--blue); margin-bottom:8px;">Analyse en cours...</div>
      <div style="font-size:13px; color:var(--text-muted); line-height:1.8;">
        ${lines.map(l => `${l}<br>`).join('')}
      </div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;
}

function renderError(title, msg) {
  state.screen = 'error';
  document.getElementById('status-label').textContent = 'Erreur';
  document.getElementById('main').innerHTML = `
    <div class="card" style="text-align:center; padding:40px 32px;">
      <div style="font-size:32px; margin-bottom:16px;">⚠️</div>
      <div style="font-size:15px; font-weight:700; color:var(--red); margin-bottom:8px;">${title}</div>
      <div style="font-size:13px; color:var(--text-muted); margin-bottom:24px; line-height:1.6;">${msg}</div>
      <button class="action-btn" onclick="reset()">↩ Réessayer</button>
    </div>`;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const items = [];
  if (state.selectedCategory) {
    items.push(`<div class="crumb">${state.selectedCategory.name}</div>`);
  }
  items.push(...state.questionHistory.map(h => `
    <div class="crumb">${h.q.substring(0, 24)}... <span class="answer">→ ${h.a.substring(0, 15)}</span></div>
  `));
  bc.innerHTML = items.join('');
}

function updateProgress() {
  const pct = Math.min((state.stepCount / MAX_STEPS) * 100, 95);
  document.getElementById('progress').style.width = pct + '%';
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function selectCategory(categoryId) {
  const cat = state.categories.find(c => c.id === categoryId);
  if (!cat) return;

  state.selectedCategory = cat;
  state.screen = 'diagnosing';
  state.messages = [];
  state.questionHistory = [];
  state.stepCount = 0;
  state.feedbackStats = {};

  renderLoading('Chargement des entrées...', `Catégorie : ${cat.name}`, 'Chargement des stats terrain...');

  try {
    state.entries = await loadEntries(categoryId);

    // Charger les stats de feedback pour chaque entrée
    await Promise.all(state.entries.map(async e => {
      state.feedbackStats[e.symptom] = await loadFeedbackStats(e.symptom);
    }));

    state.messages.push({
      role: 'user',
      content: `Démarre le diagnostic pour la catégorie "${cat.name}". Pose la première question la plus discriminante.`
    });
    await askClaude();
  } catch (e) {
    renderError('Erreur chargement', 'Impossible de charger les entrées depuis la base. Vérifiez la connexion Supabase.');
  }
}

function backToCategories() {
  state.screen = 'categories';
  state.selectedCategory = null;
  state.entries = [];
  state.messages = [];
  state.questionHistory = [];
  state.stepCount = 0;
  state.currentQuestion = null;
  state.currentResult = null;
  render();
}

function reset() {
  state = {
    screen: 'categories',
    categories: state.categories, // garder les catégories chargées
    entries: [],
    selectedCategory: null,
    messages: [],
    questionHistory: [],
    stepCount: 0,
    currentQuestion: null,
    currentResult: null,
  };
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  render(); // afficher le loading

  try {
    // 1. Charger la config Supabase depuis Vercel env vars via /api/config
    const cfg = await fetch('/api/config').then(r => r.json());
    SUPABASE_URL  = cfg.supabaseUrl  || '';
    SUPABASE_ANON = cfg.supabaseAnon || '';
    contribPin    = cfg.contribPin   || '1234';

    if (!SUPABASE_URL || !SUPABASE_ANON) {
      renderError(
        'Configuration manquante',
        'Variables SUPABASE_DIAGTECH_URL et SUPABASE_DIAGTECH_ANON absentes dans Vercel → Settings → Environment Variables.'
      );
      return;
    }

    // 2. Charger les catégories depuis Supabase
    state.categories = await loadCategories();
    state.screen = 'categories';
    document.getElementById('status-label').textContent = `v2.0 · ${state.categories.length} catégories`;
    render();

  } catch (e) {
    renderError('Erreur de chargement', e.message || 'Vérifiez la connexion et les variables d\'environnement Vercel.');
  }
}

// ─── CONTRIBUTION ─────────────────────────────────────────────────────────────
let contribPin = '';

function openContribModal() {
  const catOptions = state.categories.map(c =>
    `<option value="${c.id}">${c.name}</option>`
  ).join('');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'contrib-modal';
  modal.innerHTML = `
    <div class="modal">
      <h2>➕ Contribuer à la base</h2>
      <div class="modal-sub">⚠️ Entrée soumise pour validation — elle n'apparaîtra pas immédiatement</div>

      <div class="field-label">Catégorie</div>
      <select class="field-input" id="c-category">${catOptions}</select>

      <div class="field-label">Symptôme décrit par le client</div>
      <input class="field-input" id="c-symptom" placeholder="Ex: Le haut-parleur grésille uniquement en appel" />

      <div class="field-label">Questions à poser au client</div>
      <div class="dynamic-list" id="c-questions">
        <div class="dynamic-item">
          <input placeholder="Ex: Ça a commencé après une chute ?" />
          <button class="remove-btn" onclick="removeItem(this)">✕</button>
        </div>
      </div>
      <button class="add-btn" onclick="addQuestion()">+ Ajouter une question</button>

      <div class="field-label">Causes probables (par ordre de probabilité)</div>
      <div class="dynamic-list" id="c-causes">
        <div class="dynamic-item" style="flex-direction:column; gap:6px;">
          <input placeholder="Cause — Ex: Grille oreillette encrassée" style="width:100%" />
          <input placeholder="Solution — Ex: Nettoyage professionnel" style="width:100%" />
          <button class="remove-btn" style="align-self:flex-end" onclick="removeItem(this.parentElement)">✕ Supprimer</button>
        </div>
      </div>
      <button class="add-btn" onclick="addCause()">+ Ajouter une cause</button>

      <div class="field-label">Code PIN</div>
      <div class="pin-row">
        <input class="field-input" id="c-pin" type="password" placeholder="••••" maxlength="8" />
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); padding-bottom:18px;">Demande le PIN à iPhoenix</span>
      </div>

      <div id="c-error" style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--red); margin-bottom:12px; min-height:16px;"></div>

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeContribModal()">Annuler</button>
        <button class="submit-btn" onclick="submitContrib()">Soumettre →</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  document.getElementById('c-symptom').focus();
}

function closeContribModal() {
  document.getElementById('contrib-modal')?.remove();
}

function addQuestion() {
  const list = document.getElementById('c-questions');
  const div = document.createElement('div');
  div.className = 'dynamic-item';
  div.innerHTML = `
    <input placeholder="Ex: Contact avec eau récemment ?" />
    <button class="remove-btn" onclick="removeItem(this)">✕</button>`;
  list.appendChild(div);
}

function addCause() {
  const list = document.getElementById('c-causes');
  const div = document.createElement('div');
  div.className = 'dynamic-item';
  div.style.cssText = 'flex-direction:column; gap:6px;';
  div.innerHTML = `
    <input placeholder="Cause — Ex: Batterie dégradée" style="width:100%" />
    <input placeholder="Solution — Ex: Remplacement batterie" style="width:100%" />
    <button class="remove-btn" style="align-self:flex-end" onclick="removeItem(this.parentElement)">✕ Supprimer</button>`;
  list.appendChild(div);
}

function removeItem(el) {
  el.closest('.dynamic-item')?.remove();
}

async function submitContrib() {
  const errEl = document.getElementById('c-error');
  errEl.textContent = '';

  const categoryId = document.getElementById('c-category').value;
  const symptom    = document.getElementById('c-symptom').value.trim();
  const pin        = document.getElementById('c-pin').value.trim();

  // Validation
  if (!symptom) { errEl.textContent = '→ Le symptôme est obligatoire.'; return; }
  if (!pin)     { errEl.textContent = '→ Le code PIN est obligatoire.'; return; }
  if (pin !== contribPin) { errEl.textContent = '→ Code PIN incorrect.'; return; }

  // Collecter les questions
  const questions = [...document.querySelectorAll('#c-questions .dynamic-item input')]
    .map(i => i.value.trim()).filter(Boolean);

  // Collecter les causes
  const causeItems = document.querySelectorAll('#c-causes .dynamic-item');
  const causes = [...causeItems].map((item, idx) => {
    const inputs = item.querySelectorAll('input');
    return {
      rank: idx + 1,
      cause: inputs[0]?.value.trim() || '',
      solution: inputs[1]?.value.trim() || ''
    };
  }).filter(c => c.cause);

  if (causes.length === 0) { errEl.textContent = '→ Au moins une cause est obligatoire.'; return; }

  // Keywords auto générés depuis le symptôme
  const keywords = symptom.toLowerCase().split(/\s+/).filter(w => w.length > 3);

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/diagnostic_entries`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        category_id: categoryId,
        symptom,
        questions_to_ask: questions,
        causes,
        keywords,
        source: 'contributor',
        validated: false,
        validated_by: null
      })
    });

    if (!res.ok) throw new Error(`Erreur ${res.status}`);

    closeContribModal();

    // Confirmation visuelle
    const thanks = document.createElement('div');
    thanks.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid rgba(0,255,135,0.3); border-radius:12px; padding:14px 24px; font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--green); z-index:200; animation:slideIn 0.3s ease;';
    thanks.textContent = '✅ Contribution soumise — merci ! Elle sera validée avant apparition.';
    document.body.appendChild(thanks);
    setTimeout(() => thanks.remove(), 4000);

  } catch (e) {
    errEl.textContent = `→ Erreur : ${e.message}`;
  }
}

init();
</script>
