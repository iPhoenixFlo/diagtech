<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiagTech — Akinator Réparateur</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0f;
    --surface: #0f1218;
    --surface2: #161b24;
    --surface3: #1c2330;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --green: #00ff87;
    --red: #ff4757;
    --yellow: #ffd32a;
    --blue: #00b4d8;
    --text: #dde3ee;
    --text-muted: #556070;
    --text-dim: #8896aa;
  }

  body {
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,255,135,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,180,216,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .app {
    width: 100%;
    max-width: 600px;
    position: relative;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: block;
    margin-top: 1px;
  }

  .reset-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

  /* PROGRESS */
  .progress-bar {
    height: 2px;
    background: var(--surface3);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* BREADCRUMB */
  .breadcrumb {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
    min-height: 24px;
  }

  .crumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .crumb .answer {
    color: var(--green);
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 20px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .q-number::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .q-text {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 28px;
  }

  .q-hint {
    font-size: 13px;
    color: var(--text-muted);
    background: var(--surface2);
    border-left: 2px solid var(--border2);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* ANSWER BUTTONS */
  .answers {
    display: grid;
    gap: 10px;
  }

  .answers.two-col {
    grid-template-columns: 1fr 1fr;
  }

  .ans-btn {
    padding: 16px 20px;
    border-radius: 12px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ans-btn:hover {
    transform: translateY(-1px);
    background: var(--surface3);
  }

  .ans-btn.yes {
    border-color: rgba(0,255,135,0.2);
  }
  .ans-btn.yes:hover {
    border-color: rgba(0,255,135,0.5);
    background: rgba(0,255,135,0.06);
    color: var(--green);
  }

  .ans-btn.no {
    border-color: rgba(255,71,87,0.2);
  }
  .ans-btn.no:hover {
    border-color: rgba(255,71,87,0.5);
    background: rgba(255,71,87,0.06);
    color: var(--red);
  }

  .ans-btn.maybe {
    border-color: rgba(255,211,42,0.2);
  }
  .ans-btn.maybe:hover {
    border-color: rgba(255,211,42,0.5);
    background: rgba(255,211,42,0.06);
    color: var(--yellow);
  }

  .ans-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  /* RESULT CARD */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 32px;
    animation: slideIn 0.3s ease;
  }

  .result-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
  }

  .result-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .result-icon.urgent { background: rgba(255,71,87,0.12); border: 1px solid rgba(255,71,87,0.3); }
  .result-icon.normal { background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.2); }
  .result-icon.warning { background: rgba(255,211,42,0.08); border: 1px solid rgba(255,211,42,0.2); }

  .result-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .result-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .result-piece {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }

  .result-piece-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .result-piece-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
  }

  .result-notes {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .result-note {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13.5px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .note-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    margin-top: 7px;
    flex-shrink: 0;
  }

  .urgency-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 20px;
  }

  .urgency-tag.urgent { background: rgba(255,71,87,0.12); color: var(--red); border: 1px solid rgba(255,71,87,0.3); }
  .urgency-tag.normal { background: rgba(0,255,135,0.08); color: var(--green); border: 1px solid rgba(0,255,135,0.2); }
  .urgency-tag.warning { background: rgba(255,211,42,0.08); color: var(--yellow); border: 1px solid rgba(255,211,42,0.2); }

  .action-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .action-btn:hover { background: var(--surface3); border-color: rgba(255,255,255,0.15); }

  /* CONFIDENCE */
  .confidence {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .confidence-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .confidence-bar {
    flex: 1;
    height: 4px;
    background: var(--surface3);
    border-radius: 4px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .confidence-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .action-btn { margin-bottom: 0; }

  .action-btn.deepen {
    border-color: rgba(0,180,216,0.3);
    color: var(--blue);
    margin-bottom: 8px;
  }
  .action-btn.deepen:hover {
    background: rgba(0,180,216,0.08);
    border-color: rgba(0,180,216,0.5);
  }

  .result-divider {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin: 4px 0 12px;
    letter-spacing: 0.08em;
  }

  /* API KEY MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,15,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    backdrop-filter: blur(6px);
  }

  .modal {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 32px;
    animation: fadeUp 0.3s ease;
  }

  .modal-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,77,255,0.15));
    border: 1px solid rgba(0,229,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 20px;
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal p a {
    color: var(--blue);
    text-decoration: none;
  }

  .modal-input-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 13px 46px 13px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.04em;
  }

  .modal-input:focus { border-color: rgba(0,229,255,0.4); }
  .modal-input::placeholder { color: var(--text-muted); letter-spacing: 0; }

  .modal-toggle {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 15px; padding: 0;
    transition: color 0.15s;
  }
  .modal-toggle:hover { color: var(--text); }

  .modal-error {
    font-size: 12px;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
    min-height: 16px;
  }

  .modal-submit {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--blue), #7c4dff);
    border: none;
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-bottom: 12px;
  }
  .modal-submit:hover { opacity: 0.85; }

  .modal-note {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    line-height: 1.5;
  }

  .api-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--green);
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .api-badge:hover { opacity: 1; }
  .api-badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div>
        <h1>DiagTech</h1>
        <span id="kb-count">Akinator Réparateur v1.0</span>
      </div>
    </div>
    <button class="reset-btn" onclick="reset()">↩ Recommencer</button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width: 0%"></div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div id="main"></div>
</div>

<script>
// ─── ARBRE DE DÉCISION ───────────────────────────────────────────────────────

const tree = {
  id: "start",
  q: "Le téléphone s'allume-t-il ?",
  hint: "Appuyer sur le bouton power — même brièvement. Toute réaction compte.",
  answers: [
    {
      label: "Oui", icon: "✅", type: "yes",
      next: {
        id: "allume_ecran",
        q: "L'écran s'affiche-t-il correctement ?",
        hint: "L'image est visible, lisible, sans zones noires ou lignes.",
        answers: [
          {
            label: "Oui", icon: "✅", type: "yes",
            next: {
              id: "symptome",
              q: "Quel est le symptôme principal signalé ?",
              hint: "Choisir le plus proche de ce que décrit le client.",
              answers: [
                { label: "🔁 Redémarrages aléatoires", icon: "", type: "maybe", next: "reboot" },
                { label: "⚡ Ne charge plus", icon: "", type: "maybe", next: "charge" },
                { label: "🔈 Problème de son", icon: "", type: "maybe", next: "son" },
                { label: "🔊 Écho / micro", icon: "", type: "maybe", next: "echo" },
                { label: "📷 Caméra floue / HS", icon: "", type: "maybe", next: "camera" },
                { label: "🔘 Bouton power intermittent", icon: "", type: "maybe", next: "bouton" },
                { label: "👁️ Problème Face ID", icon: "", type: "maybe", next: "faceid" },
              ]
            }
          },
          {
            label: "Non — écran noir", icon: "❌", type: "no",
            next: {
              id: "ecran_noir_tactile",
              q: "Le tactile répond-il encore ?",
              hint: "Tester en aveugle : appel entrant, vibration sur message...",
              answers: [
                {
                  label: "Oui", icon: "✅", type: "yes",
                  result: {
                    title: "Dalle OLED / LCD défaillante",
                    piece: "Remplacement écran complet",
                    urgency: "normal",
                    icon: "📱",
                    confidence: 88,
                    notes: [
                      "Le tactile fonctionne = la carte mère est OK",
                      "Souvent lié à une fissure non réparée qui a progressé",
                      "Données non menacées"
                    ]
                  }
                },
                {
                  label: "Non", icon: "❌", type: "no",
                  next: {
                    id: "ecran_noir_chute",
                    q: "Il y a eu une chute récente ?",
                    hint: null,
                    answers: [
                      {
                        label: "Oui", icon: "✅", type: "yes",
                        result: {
                          title: "Nappe écran arrachée ou connecteur desoudé",
                          piece: "Vérifier nappe + connecteur écran",
                          urgency: "normal",
                          icon: "🔌",
                          confidence: 75,
                          notes: [
                            "Chute + écran noir + tactile mort = nappe probablement touchée",
                            "Ouvrir et vérifier les connecteurs avant de commander une dalle",
                            "Peut aussi être la dalle elle-même selon la violence du choc"
                          ]
                        }
                      },
                      {
                        label: "Non", icon: "❌", type: "no",
                        result: {
                          title: "Problème carte mère possible",
                          piece: "Diagnostic approfondi nécessaire",
                          urgency: "warning",
                          icon: "⚠️",
                          confidence: 60,
                          notes: [
                            "Écran noir + tactile mort + sans chute = suspect",
                            "Vérifier d'abord les connecteurs internes",
                            "Peut être un composant vidéo sur la carte mère"
                          ]
                        }
                      }
                    ]
                  }
                }
              ]
            }
          },
          {
            label: "Affichage abîmé (lignes, taches, pixels)", icon: "🟫", type: "maybe",
            result: {
              title: "Dalle OLED endommagée",
              piece: "Remplacement écran complet obligatoire",
              urgency: "normal",
              icon: "📱",
              confidence: 95,
              notes: [
                "Lignes / taches / pixels morts = dalle HS, pas réparable",
                "Souvent suite à une fissure ou choc",
                "Données en sécurité si le téléphone fonctionne"
              ]
            }
          }
        ]
      }
    },
    {
      label: "Non — aucun signe de vie", icon: "❌", type: "no",
      next: {
        id: "no_power_hardreboot",
        q: "Le hard reboot a-t-il été tenté ?",
        hint: "iPhone : Vol+ / Vol- / Power maintenu. Android : Power maintenu 10-15s.",
        answers: [
          {
            label: "Non, pas encore", icon: "⚠️", type: "maybe",
            result: {
              title: "Tenter le hard reboot en premier !",
              piece: "Aucune pièce — manipulation logicielle",
              urgency: "normal",
              icon: "🔄",
              confidence: 80,
              notes: [
                "iPhone : Vol+ x1 → Vol- x1 → maintenir Power",

                "4 fois sur 5 ça repart sans aucune réparation",
                "Si ça ne marche pas → revenir et continuer le diagnostic"
              ]
            }
          },
          {
            label: "Oui, sans résultat", icon: "✅", type: "yes",
            next: {
              id: "no_power_chargé",
              q: "Le téléphone a été chargé au moins 30 minutes ?",
              hint: "Parfois la batterie est trop déchargée pour déclencher le démarrage.",
              answers: [
                {
                  label: "Non", icon: "❌", type: "no",
                  result: {
                    title: "Batterie trop déchargée — charger d'abord",
                    piece: "Attendre 30 min avant tout diagnostic",
                    urgency: "normal",
                    icon: "🔋",
                    confidence: 70,
                    notes: [
                      "Une batterie à 0% depuis longtemps refuse parfois de démarrer",
                      "Laisser branché 30 min puis retenter le hard reboot",
                      "Si toujours rien après → batterie HS probable"
                    ]
                  }
                },
                {
                  label: "Oui, branché 30 min+", icon: "✅", type: "yes",
                  next: {
                    id: "no_power_chauffe",
                    q: "Le téléphone chauffe-t-il quand il est branché ?",
                    hint: "Poser la main au dos — même légère chaleur anormale compte.",
                    answers: [
                      {
                        label: "Oui, ça chauffe", icon: "🔥", type: "yes",
                        result: {
                          title: "Court-circuit — probablement carte mère",
                          piece: "Diagnostic carte mère urgent",
                          urgency: "urgent",
                          icon: "⚡",
                          confidence: 78,
                          notes: [
                            "Chauffe sans s'allumer = consommation anormale",
                            "Ne pas laisser branché longtemps",
                            "Souvent lié à un dégât des eaux non détecté"
                          ]
                        }
                      },
                      {
                        label: "Non, aucune chaleur", icon: "❄️", type: "no",
                        result: {
                          title: "Batterie HS",
                          piece: "Remplacement batterie",
                          urgency: "normal",
                          icon: "🔋",
                          confidence: 82,
                          notes: [
                            "Aucun signe de vie + hard reboot échoué + pas de chaleur = batterie morte",
                            "Commencer par la batterie avant d'envisager la carte mère",
                            "Vérifier aussi le connecteur de batterie sur la carte"
                          ]
                        }
                      }
                    ]
                  }
                }
              ]
            }
          }
        ]
      }
    },
    {

          notes: ["Dégât des eaux + symptômes multiples = oxydation qui progresse", "Nettoyage ultrason de la carte mère en priorité", "Inspecter visuellement chaque composant pour traces d'oxydation", "Plus on intervient tôt, meilleures sont les chances"] }
      }
    ]
  }
};

// Mapping résultat → branche d'approfondissement
const deepenMap = {
  "Batterie défaillante": "batterie_approfondi",
  "Batterie HS": "batterie_approfondi",
  "Batterie trop déchargée — charger d'abord": "batterie_approfondi",
  "Boot loop — batterie ou logiciel": "batterie_approfondi",
  "Dalle OLED / LCD défaillante": "ecran_approfondi",
  "Dalle OLED endommagée": "ecran_approfondi",
  "Connecteur de charge défaillant": "charge_approfondi",
  "Connecteur encrassé (charpie / poussière)": "charge_approfondi",
  "Grilles encrassées": "son_approfondi",
  "Haut-parleur défaillant": "son_approfondi",
  "Connecteur de charge oxydé": "reboot_approfondi",
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentNode = tree;
let history = [];
let stepCount = 0;
const MAX_STEPS = 10;

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  updateProgress();
  renderBreadcrumb();
  const main = document.getElementById('main');

  if (currentNode.result) {
    main.innerHTML = renderResult(currentNode.result);
  } else {
    main.innerHTML = renderQuestion(currentNode);
  }
}

function renderQuestion(node) {
  const cols = node.answers.length === 2 ? 'two-col' : '';
  const hint = node.hint ? `<div class="q-hint">💡 ${node.hint}</div>` : '';
  
  const btns = node.answers.map((a, i) => `
    <button class="ans-btn ${a.type}" onclick="answer(${i})">
      <span class="ans-icon">${a.icon}</span>
      <span>${a.label}</span>
    </button>
  `).join('');

  return `
    <div class="question-card">
      <div class="q-number">Question ${stepCount + 1} / ~${MAX_STEPS}</div>
      <div class="q-text">${node.q}</div>
      ${hint}
      <div class="answers ${cols}">${btns}</div>
    </div>
  `;
}

// ─── CLÉ API ─────────────────────────────────────────────────────────────────
// ✏️  COLLE TA CLÉ API ANTHROPIC ICI (platform.anthropic.com → API Keys)
function getApiKey() { return ''; } // Clé gérée côté serveur

// ─── BASE DE CONNAISSANCE PERSISTANTE ────────────────────────────────────────
const KB_KEY = 'diagtech_knowledge_v1';

function loadKnowledge() {
  try {
    return JSON.parse(localStorage.getItem(KB_KEY) || '{}');
  } catch { return {}; }
}

function saveKnowledge(kb) {
  try {
    localStorage.setItem(KB_KEY, JSON.stringify(kb));
  } catch {}
}

function getPathKey() {
  // Clé unique basée sur le chemin de diagnostic (sans "Approfondissement IA")
  return history
    .filter(h => h.q !== "Approfondissement IA" && h.q !== "Résultat insuffisant")
    .map(h => `${h.q.substring(0,20)}:${h.a.substring(0,15)}`)
    .join('|');
}

function learnResult(result) {
  const kb = loadKnowledge();
  const key = getPathKey();
  if (!key) return;

  if (!kb[key]) kb[key] = [];

  // Éviter les doublons
  const exists = kb[key].some(r => r.title === result.title);
  if (!exists) {
    kb[key].push({
      ...result,
      learnedAt: new Date().toISOString(),
      useCount: 0
    });
    saveKnowledge(kb);
    console.log(`[DiagTech] Appris : "${result.title}" pour le chemin "${key}"`);
  }
}

function getLearnedResults() {
  const kb = loadKnowledge();
  const key = getPathKey();
  return kb[key] || [];
}

function incrementUseCount(title) {
  const kb = loadKnowledge();
  const key = getPathKey();
  if (kb[key]) {
    const r = kb[key].find(r => r.title === title);
    if (r) { r.useCount = (r.useCount || 0) + 1; saveKnowledge(kb); }
  }
}

let lastResult = null;

function renderResult(r) {
  lastResult = r;
  const urgencyMap = {
    urgent: { label: "⚡ URGENT — À traiter immédiatement", cls: "urgent" },
    normal: { label: "🕐 Peut attendre — Réparation standard", cls: "normal" },
    warning: { label: "⚠️ À surveiller — Diagnostic approfondi", cls: "warning" }
  };
  const urg = urgencyMap[r.urgency] || urgencyMap.normal;
  const confColor = r.confidence >= 80 ? '#00ff87' : r.confidence >= 65 ? '#ffd32a' : '#ff4757';

  const notes = r.notes.map(n => `
    <div class="result-note">
      <div class="note-dot"></div>
      <span>${n}</span>
    </div>
  `).join('');

  const deepenBtn = `
    <button class="action-btn deepen" id="deepenBtn" onclick="deepen()">🔍 Cette piste ne suffit pas — approfondir avec recherche IA</button>
    <div class="result-divider">ou</div>
  `;

  // Pistes apprises pour ce chemin
  const learned = getLearnedResults().filter(lr => lr.title !== r.title);
  const learnedHtml = learned.length > 0 ? `
    <div style="margin-bottom: 16px;">
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">🧠 Pistes apprises pour ce diagnostic</div>
      ${learned.map((lr, i) => `
        <button onclick="showLearned(${i})" style="width:100%; text-align:left; padding: 10px 14px; margin-bottom: 6px; border-radius: 10px; border: 1px solid rgba(0,255,135,0.2); background: rgba(0,255,135,0.04); color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s;">
          <span>${lr.icon}</span>
          <span style="flex:1">${lr.title}</span>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);">${lr.confidence}%</span>
        </button>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="result-card">
      <div class="result-header">
        <div class="result-icon ${urg.cls}">${r.icon}</div>
        <div>
          <div class="result-title">${r.title}</div>
          <div class="result-subtitle">Diagnostic en ${stepCount} question${stepCount > 1 ? 's' : ''}</div>
        </div>
      </div>

      <div class="confidence">
        <span class="confidence-label">FIABILITÉ</span>
        <div class="confidence-bar">
          <div class="confidence-fill" style="width: ${r.confidence}%; background: ${confColor}"></div>
        </div>
        <span class="confidence-pct">${r.confidence}%</span>
      </div>

      <div class="result-piece">
        <div class="result-piece-label">Intervention recommandée</div>
        <div class="result-piece-value">→ ${r.piece}</div>
      </div>

      <div class="urgency-tag ${urg.cls}">${urg.label}</div>

      <div class="result-notes">${notes}</div>

      ${learnedHtml}
      ${deepenBtn}
      <button class="action-btn" onclick="reset()">↩ Nouveau diagnostic</button>
    </div>
  `;
}

function showLearned(idx) {
  const learned = getLearnedResults();
  const r = learned[idx];
  if (!r) return;
  incrementUseCount(r.title);
  currentNode = { result: r };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deepen() {
  // Build context from history + last result
  const historyText = history.map(h => `- ${h.q} → ${h.a}`).join('\n');
  const resultText = lastResult
    ? `Diagnostic proposé : "${lastResult.title}" / Intervention : "${lastResult.piece}"`
    : "Aucun diagnostic préalable";

  const prompt = `Tu es un expert en réparation de smartphones. Un technicien a effectué un diagnostic avec les étapes suivantes :

${historyText}

${resultText}

Ce diagnostic ne semble pas suffisant ou n'a pas résolu le problème. En t'appuyant sur tes connaissances et une recherche sur les pannes similaires connues, propose une piste alternative approfondie.

Réponds UNIQUEMENT en JSON valide, sans texte autour, avec ce format exact :
{
  "title": "Titre court du diagnostic alternatif",
  "piece": "Intervention recommandée",
  "urgency": "normal" ou "urgent" ou "warning",
  "icon": "un seul emoji",
  "confidence": nombre entre 50 et 95,
  "notes": ["note 1", "note 2", "note 3"],
  "source": "courte mention de la source ou du raisonnement"
}`;

  // Show loading state
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="question-card" style="text-align:center; padding: 48px 32px;">
      <div style="font-size: 36px; margin-bottom: 20px;">🔍</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--blue); margin-bottom: 8px;">Recherche en cours...</div>
      <div style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
        Analyse du contexte de diagnostic<br>
        Recherche de pannes similaires<br>
        Génération d'une piste alternative
      </div>
      <div class="typing-dots" style="justify-content:center; margin-top: 24px;">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(response.status === 401 ? '401 auth error' : `HTTP ${response.status}`);
    }
    // Extract text from response (may be after tool_use blocks)
    const textBlock = data.content.find(b => b.type === "text");
    if (!textBlock) throw new Error("No text block");

    const clean = textBlock.text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Render as result
    const aiResult = {
      title: parsed.title || "Diagnostic approfondi",
      piece: parsed.piece || "Voir notes",
      urgency: parsed.urgency || "warning",
      icon: parsed.icon || "🔬",
      confidence: parsed.confidence || 65,
      notes: [
        ...(parsed.notes || []),
        parsed.source ? `🌐 Source : ${parsed.source}` : null
      ].filter(Boolean)
    };

    history.push({ q: "Approfondissement IA", a: aiResult.title });
    stepCount++;
    currentNode = { result: aiResult };

    // 💾 Sauvegarder dans la base de connaissance
    learnResult(aiResult);
    updateKBCount();

    render();

  } catch (e) {
    const isAuthError = e.message?.includes('401') || e.message?.includes('auth');
    main.innerHTML = `
      <div class="question-card" style="text-align:center; padding: 40px 32px;">
        <div style="font-size: 32px; margin-bottom: 16px;">⚠️</div>
        <div style="font-size: 14px; color: var(--red); margin-bottom: 8px; font-weight: 600;">
          ${isAuthError ? 'Clé API invalide ou expirée' : 'Erreur de connexion'}
        </div>
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height:1.6;">
          ${isAuthError
            ? 'Vérifiez votre clé sur platform.anthropic.com'
            : 'Vérifiez votre connexion internet et réessayez.'
          }
        </div>
        <button class="action-btn deepen" onclick="forgetApiKey(); showApiKeyScreen()" style="margin-bottom:8px;">🔑 Changer la clé API</button>
        <button class="action-btn" onclick="reset()">↩ Nouveau diagnostic</button>
      </div>
    `;
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = history.map(h => `
    <div class="crumb">${h.q.substring(0, 28)}... <span class="answer">→ ${h.a}</span></div>
  `).join('');
}

function updateProgress() {
  const pct = Math.min((stepCount / MAX_STEPS) * 100, 95);
  document.getElementById('progress').style.width = pct + '%';
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function answer(idx) {
  const a = currentNode.answers[idx];
  history.push({ q: currentNode.q.substring(0, 30), a: a.label.replace(/[^\w\s]/gi, '').trim() });
  stepCount++;

  if (a.result) {
    currentNode = { result: a.result };
  } else if (typeof a.next === 'string') {
    currentNode = branches[a.next];
  } else {
    currentNode = a.next;
  }

  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reset() {
  currentNode = tree;
  history = [];
  stepCount = 0;
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function updateKBCount() {
  const kb = loadKnowledge();
  const total = Object.values(kb).reduce((acc, arr) => acc + arr.length, 0);
  const el = document.getElementById('kb-count');
  if (el) el.textContent = total > 0
    ? `v1.0 · 🧠 ${total} piste${total > 1 ? 's' : ''} apprise${total > 1 ? 's' : ''}`
    : 'Akinator Réparateur v1.0';
}

if (false) {
  render();
  document.getElementById('main').innerHTML = `
    <div class="question-card" style="padding: 36px 32px; text-align:center;">
      <div style="font-size: 36px; margin-bottom: 16px;">🔑</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue); margin-bottom: 10px; letter-spacing:0.08em;">CONFIGURATION REQUISE</div>
      <div style="font-size: 17px; font-weight: 700; margin-bottom: 12px; letter-spacing:-0.02em;">Colle ta clé API dans le fichier</div>
      <div style="font-size: 13px; color: var(--text-muted); line-height: 1.7; text-align:left; background: var(--surface2); border-radius: 12px; padding: 16px 20px;">
        1. Ouvre <strong style="color:var(--text)">akinator-reparateur.html</strong> dans VS Code<br>
        2. Trouve la ligne : <code style="color:var(--blue); font-size:11px;">const ANTHROPIC_API_KEY = "COLLE_TA_CLE_ICI"</code><br>
        3. Remplace <code style="color:var(--red); font-size:11px;">COLLE_TA_CLE_ICI</code> par ta clé<br>
        4. Sauvegarde (<strong style="color:var(--text)">Cmd+S</strong>) et recharge la page
      </div>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 14px;">
        Clé disponible sur <span style="color:var(--blue);">platform.anthropic.com</span> → API Keys
      </div>
    </div>
  `;
} else {
  render();
  updateKBCount();
}
</script>
